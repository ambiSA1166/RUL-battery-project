<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battery RUL Predictor</title>
    <style>
        :root {
            --primary: #2ecc71;
            --primary-dark: #27ae60;
            --bg: #f5f7fa;
            --card-bg: #ffffff;
            --text: #2c3e50;
            --text-light: #7f8c8d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 650px;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        h2 {
            margin-top: 0;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .subtitle {
            color: var(--text-light);
            font-size: 0.95rem;
            margin-bottom: 25px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 500px) {
            .form-grid { grid-template-columns: 1fr; }
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .input-group.full-width {
            grid-column: span 2;
        }

        @media (max-width: 500px) {
            .input-group.full-width { grid-column: span 1; }
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text);
        }

        input {
            padding: 10px;
            border: 1px solid #dcdde1;
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
            transition: border 0.2s;
        }

        input:focus {
            border-color: var(--primary);
        }

        button {
            margin-top: 25px;
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--primary-dark);
        }

        #result-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            background-color: #f8f9fa;
            border-left: 5px solid var(--primary);
            display: none;
        }

        .result-title {
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .analytics-item {
            font-size: 0.9rem;
            margin: 4px 0;
            color: var(--text-light);
        }

        .highlight {
            color: var(--text);
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>🔋 Battery RUL Diagnostic Panel</h2>
        <p class="subtitle">Enter telemetry sensor parameters below to calculate remaining operational cycles.</p>
        
        <form id="prediction-form">
            <div class="form-grid">
                <div class="input-group">
                    <label>Discharge Time (s)</label>
                    <input type="number" step="any" id="discharge_time" value="2150.0" required>
                </div>
                <div class="input-group">
                    <label>Decrement 3.6-3.4V (s)</label>
                    <input type="number" step="any" id="decrement_range" value="1150.0" required>
                </div>
                <div class="input-group">
                    <label>Max. Voltage Discharge (V)</label>
                    <input type="number" step="any" id="max_voltage_discharge" value="4.02" required>
                </div>
                <div class="input-group">
                    <label>Min. Voltage Charge (V)</label>
                    <input type="number" step="any" id="min_voltage_charge" value="3.36" required>
                </div>
                <div class="input-group">
                    <label>Time at 4.15V (s)</label>
                    <input type="number" step="any" id="time_at_voltage_threshold" value="20.0" required>
                </div>
                <div class="input-group">
                    <label>Time Constant Current (s)</label>
                    <input type="number" step="any" id="time_constant_current" value="620.0" required>
                </div>
                <div class="input-group full-width">
                    <label>Total Charging Time (s)</label>
                    <input type="number" step="any" id="charging_time" value="5100.0" required>
                </div>
            </div>
            
            <button type="submit">Run Model Diagnostics</button>
        </form>

        <div id="result-box">
            <div class="result-title">Predicted Life: <span id="predicted-val" style="color: var(--primary-dark);">--</span> cycles</div>
            <div class="analytics-item">95% Confidence Interval: <span id="ci-val" class="highlight">--</span></div>
            <div class="analytics-item">Margin of Error: <span id="me-val" class="highlight">--</span></div>
            <div class="analytics-item">Forest Disagreement Std: <span id="std-val" class="highlight">--</span></div>
        </div>
    </div>
</div>

<script>
    document.getElementById('prediction-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Construct the raw payload from input elements
        const payload = {
            discharge_time: parseFloat(document.getElementById('discharge_time').value),
            decrement_range: parseFloat(document.getElementById('decrement_range').value),
            max_voltage_discharge: parseFloat(document.getElementById('max_voltage_discharge').value),
            min_voltage_charge: parseFloat(document.getElementById('min_voltage_charge').value),
            time_at_voltage_threshold: parseFloat(document.getElementById('time_at_voltage_threshold').value),
            time_constant_current: parseFloat(document.getElementById('time_constant_current').value),
            charging_time: parseFloat(document.getElementById('charging_time').value)
        };

        try {
            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            
            // Render calculations into interface blocks
            document.getElementById('predicted-val').innerText = data['Predicted RUL'];
            document.getElementById('ci-val').innerText = `[${data['Confidence Analytics']['95% Confidence Interval'].join(', ')}] cycles`;
            document.getElementById('me-val').innerText = `±${data['Confidence Analytics']['Margin of Error (cycles)']} cycles`;
            document.getElementById('std-val').innerText = `${data['Confidence Analytics']['Model Disagreement Standard Deviation']} cycles`;
            
            document.getElementById('result-box').style.display = 'block';
        } catch (error) {
            alert('Prediction error, check console metrics.');
            console.error(error);
        }
    });
</script>

</body>
</html>
